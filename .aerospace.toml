# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
ctrl-alt-tab = "workspace-back-and-forth"
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
ctrl-alt-shift-tab = "move-workspace-to-monitor --wrap-around next"

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
ctrl-alt-shift-semicolon = "mode service"

# "service" binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ["reload-config", "mode main"]
r = ["flatten-workspace-tree", "mode main"] # reset layout
f = [
  "layout floating tiling",
  "mode main",
] # Toggle between floating and tiling layout
backspace = ["close-all-windows-but-current", "mode main"]

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
#s = ["layout sticky tiling", "mode main"]

ctrl-alt-cmd-shift-h = ["join-with left", "mode main"]
ctrl-alt-cmd-shift-j = ["join-with down", "mode main"]
ctrl-alt-cmd-shift-k = ["join-with up", "mode main"]
ctrl-alt-cmd-shift-l = ["join-with right", "mode main"]

ctrl-alt-cmd-shift-left = ["join-with left", "mode main"]
ctrl-alt-cmd-shift-down = ["join-with down", "mode main"]
ctrl-alt-cmd-shift-up = ["join-with up", "mode main"]
ctrl-alt-cmd-shift-right = ["join-with right", "mode main"]

down = "volume down"
up = "volume up"
shift-down = ["volume set 0", "mode main"]

# Vivaldi browser          -> 1
[[on-window-detected]]
if.app-id = "com.vivaldi.Vivaldi"
run = "move-node-to-workspace 1"

# Safari browser           -> 1
[[on-window-detected]]
if.app-id = "com.apple.Safari"
run = "move-node-to-workspace 1"

# Zen browser           -> 1
[[on-window-detected]]
if.app-id = "app.zen-browser.zen"
run = "move-node-to-workspace 1"

# Slack                 -> 2
[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run = "move-node-to-workspace 2"

# Zoom                  -> 3
[[on-window-detected]]
if.app-id = "us.zoom.xos"
run = "move-node-to-workspace 3"

# iTerm2                -> 4
[[on-window-detected]]
if.app-id = "com.googlecode.iterm2"
run = "move-node-to-workspace 4"

# Ghostty               -> 5
# For my notes for now. This is _a_ way to keep them open.
[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = "move-node-to-workspace 5"

# Emacs                 -> 5
[[on-window-detected]]
if.app-id = "org.gnu.Emacs"
run = "move-node-to-workspace 5"

# ChatGPT               -> 6
[[on-window-detected]]
if.app-id = "com.openai.chat"
run = "move-node-to-workspace 6"

# Cursor                -> 7
[[on-window-detected]]
if.app-id = "com.todesktop.230313mzl4w4u92"
run = "move-node-to-workspace 7"

# Apple Calendar        -> C
[[on-window-detected]]
if.app-id = "com.apple.iCal"
run = "move-node-to-workspace C"

# Docker Desktop        -> D
[[on-window-detected]]
if.app-id = "com.electron.dockerdesktop"
run = "move-node-to-workspace D"

# Miro                  -> M
[[on-window-detected]]
if.app-id = "com.electron.realtimeboard"
run = "move-node-to-workspace M"

# 1Password             -> P
[[on-window-detected]]
if.app-id = "com.1password.1password"
run = "move-node-to-workspace P"

# Karabiner Elements    -> Float
[[on-window-detected]]
if.app-id = "org.pqrs.Karabiner-Elements.Settings"
check-further-callbacks = true
run = "layout floating"

# Quick Look (space bar on file in Finder) -> Float
[[on-window-detected]]
if.window-title-regex-substring = "Quick Look"
check-further-callbacks = true
run = "layout floating"


[workspace-to-monitor-force-assignment]
# ===================
# I AM NOT USING THIS TO ASSIGN WORKSPACES TO MONITORS because I want to be
# able to move workspaces between monitors as necessary.
# https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
# states "The command fails for workspaces that have monitor force
# assignment."
# RATHER, I'm using a script: ~/Projects/dotfiles/scripts/move-workspaces
# ===================
#
# The first matching pattern will be used
# 1 = 1                            # Monitor sequence number from left to right. 1-based indexing
# 2 = "main"                       # Main monitor
# 3 = "secondary"                  # Non-main monitor in case when there are only two monitors
# 4 = "built-in"                   # Case insensitive regex substring
# 5 = "^built-in retina display$"  # Case insensitive regex match
# 6 = ["secondary", "dell"]        # You can specify multiple patterns.
