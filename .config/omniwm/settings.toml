[general]
animationsEnabled = true
defaultLayoutType = "niri"
hotkeysEnabled = true
# Set ipcEnabled to true to drive OmniWM from scripts via omniwmctl — required for the planned
# call-mode layout scripts (me / call-primary / call-secondary) and any other IPC/CLI
# automation. The move-workspace-to-monitor *hotkey* does not need this; only scripting does.
ipcEnabled = false
preventSleepEnabled = false
updateChecksEnabled = true

[gestures]
fingerCount = 3
invertDirection = true
mouseResizeModifierKey = "option"
scrollEnabled = true
scrollModifierKey = "optionShift"
scrollSensitivity = 5.0

[mouseWarp]
axis = "horizontal"
margin = 1
monitorOrder = []

[niri]
alwaysCenterSingleColumn = false
centerFocusedColumn = "never"
columnWidthPresets = [0.3333333333333333, 0.5, 0.6666666666666666]
defaultColumnWidth = 0.5
infiniteLoop = false
maxVisibleColumns = 3
maxWindowsPerColumn = 10
singleWindowAspectRatio = "none"

[quakeTerminal]
