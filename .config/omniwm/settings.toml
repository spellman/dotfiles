# --- Optional: fewer visible columns on the laptop than on the 32" 4K -----------------
# The global [niri] maxVisibleColumns (3) applies to every monitor. To cap the 16"
# MacBook display at fewer columns, add a per-monitor override. How:
#   1. Delete the line  monitorNiriOverrides = []  near the top of this file — you can't
#      have both that empty-array line and the [[monitorNiriOverrides]] block below.
#   2. Uncomment the block below and fill in:
#        - id:          any unique UUID. Generate one in a terminal with:  uuidgen
#        - monitorName: the macOS display name. On this MacBook it is exactly
#                       "Built-in Retina Display" (from NSScreen.localizedName).
#        - maxVisibleColumns: 1 or 2 for the laptop.
#   Other overridable niri fields: centerFocusedColumn ("never" | "always" | "onOverflow"),
#   alwaysCenterSingleColumn (true/false), singleWindowAspectRatio ("none" | "16:9" |
#   "4:3" | "21:9" | "1:1"), infiniteLoop (true/false).
#   (columnWidthPresets and defaultColumnWidth are global only — not per-monitor.)
#
# [[monitorNiriOverrides]]
# id = "PASTE-uuidgen-OUTPUT-HERE"
# monitorName = "Built-in Retina Display"
# maxVisibleColumns = 2

