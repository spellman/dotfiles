# Monitor focus on the Vim-directional grammar: Control+Command+H/L = focus the left/
# right screen. This rebinds focusMonitorNext off Tab, freeing Control+Command+Tab to
# pair with move-workspace-to-monitor (below). Set Next back to "Control+Command+Tab"
# if you prefer the old binding.
[[hotkeys]]
binding = "Control+Command+L"
id = "focusMonitorNext"

[[hotkeys]]
binding = "Control+Command+H"
id = "focusMonitorPrevious"

[[hotkeys]]
